<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultGuard Pro | Password Intelligence</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5; /* Indigo Blue */
            --primary-hover: #4338CA;
            --bg-white: #FFFFFF;
            --bg-gray: #F9FAFB;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            background: var(--bg-);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--primary); }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            width: 100%;
        }

        .header-text {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-text h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .header-text p {
            color: var(--text-muted);
        }

        /* Cards */
        .tool-card {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Input Styling */
        .input-group {
            position: relative;
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            border: 2px solid var(--border);
            outline: none;
            transition: 0.3s;
            background: var(--bg-gray);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: var(--bg-white);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .eye-icon {
            position: absolute;
            right: 20px;
            top: 22px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Strength Meter */
        .strength-container {
            margin: 20px 0;
        }

        .meter-bg {
            height: 8px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: var(--danger);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Breach Area */
        .breach-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .breach-danger { background: #FEF2F2; border: 1px solid #FEE2E2; color: #991B1B; }
        .breach-success { background: #ECFDF5; border: 1px solid #D1FAE5; color: #065F46; }

        /* Generator Area */
        .gen-output-container {
            background: var(--bg-gray);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px dashed var(--border);
            margin-bottom: 25px;
        }

        #passResult {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            word-break: break-all;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-check {
            background: var(--text-main);
            color: white;
            margin-top: 15px;
        }

        /* Slider */
        .slider-group { margin-bottom: 20px; }
        input[type=range] { width: 100%; margin: 15px 0; accent-color: var(--primary); }

        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

    </style>
</head>
<body>

<nav>
    <a href="https://nhtechno.online" class="logo"><i class="fas fa-shield-halved"></i>NH TECHNO {VaultGuard} </a>
    <a href="https://nhtechno.online" class="back-link">Back to NH TECHNO</a>
</nav>

<div class="container">
    <div class="header-text">
        <h1>Password Intelligence</h1>
        <p>Analyze strength, check for data breaches, and generate secure keys.</p>
    </div>

    <!-- MAIN TOOL CARD -->
    <div class="tool-card">
        <h2><i class="fas fa-fingerprint"></i> Security Analyzer</h2>
        
        <div class="input-group">
            <input type="password" id="mainInput" placeholder="Enter password to test security...">
            <i class="fas fa-eye eye-icon" id="toggleEye"></i>
        </div>

        <div class="strength-container">
            <div class="meter-bg"><div id="meterFill" class="meter-fill"></div></div>
            <div class="strength-label">
                <span id="strengthText">Score: 0%</span>
                <span id="complexityText">Weak</span>
            </div>
        </div>

        <button onclick="performBreachCheck()" class="btn btn-check">
            <i class="fas fa-search-shield"></i> Run Data Breach Scan
        </button>

        <div id="breachStatus" class="breach-box">
            <strong id="breachTitle"></strong>
            <p id="breachDetails" style="font-size: 0.9rem; margin-top: 5px;"></p>
        </div>
    </div>

    <!-- GENERATOR CARD -->
    <div class="tool-card">
        <h2><i class="fas fa-wand-magic-sparkles"></i> Smart Generator</h2>
        
        <div class="gen-output-container">
            <span id="passResult">Select Length...</span>
            <i class="far fa-copy" style="cursor:pointer; color:var(--primary); font-size:1.2rem;" onclick="copyPassword()"></i>
        </div>

        <div class="slider-group">
            <div class="strength-label">
                <span>Character Length</span>
                <span id="lenDisplay">16</span>
            </div>
            <input type="range" id="lenSlider" min="8" max="50" value="16">
        </div>

        <button onclick="generateNew()" class="btn btn-primary">Generate Secure Password</button>
    </div>
</div>

<footer>
    &copy; 2026 VaultGuard Pro | Integrated Security by NH TECHNO
</footer>

<script>
    // 1. Password Visibility
    const mainInput = document.getElementById('mainInput');
    const toggleEye = document.getElementById('toggleEye');

    toggleEye.addEventListener('click', () => {
        const type = mainInput.type === 'password' ? 'text' : 'password';
        mainInput.type = type;
        toggleEye.classList.toggle('fa-eye-slash');
    });

    // 2. Real-time Analyzer
    mainInput.addEventListener('input', () => {
        const val = mainInput.value;
        let score = 0;

        if (val.length > 0) {
            if (val.length >= 8) score += 25;
            if (val.length >= 14) score += 10;
            if (/[A-Z]/.test(val)) score += 15;
            if (/[0-9]/.test(val)) score += 15;
            if (/[^A-Za-z0-9]/.test(val)) score += 25;
            if (val.length > 20) score += 10;
        }

        if(score > 100) score = 100;

        const meter = document.getElementById('meterFill');
        const sText = document.getElementById('strengthText');
        const cText = document.getElementById('complexityText');

        meter.style.width = score + "%";
        sText.innerText = `Score: ${score}%`;

        if (score < 40) {
            meter.style.background = "#EF4444";
            cText.innerText = "Risky";
            cText.style.color = "#EF4444";
        } else if (score < 70) {
            meter.style.background = "#F59E0B";
            cText.innerText = "Moderate";
            cText.style.color = "#F59E0B";
        } else {
            meter.style.background = "#10B981";
            cText.innerText = "Military Grade";
            cText.style.color = "#10B981";
        }
    });

    // 3. Breach Checker (Pwned Passwords API)
    async function performBreachCheck() {
        const pwd = mainInput.value;
        const statusBox = document.getElementById('breachStatus');
        if (!pwd) return alert("Please type a password first.");

        // Hash using SHA-1
        const encoder = new TextEncoder();
        const data = encoder.encode(pwd);
        const hashBuffer = await crypto.subtle.digest('SHA-1', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

        const prefix = hashHex.substring(0, 5);
        const suffix = hashHex.substring(5);

        try {
            const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
            const text = await response.text();
            const lines = text.split('\n');
            let count = 0;

            for (let line of lines) {
                const [hSuffix, hCount] = line.split(':');
                if (hSuffix === suffix) {
                    count = parseInt(hCount);
                    break;
                }
            }

            statusBox.style.display = "block";
            if (count > 0) {
                statusBox.className = "breach-box breach-danger";
                document.getElementById('breachTitle').innerText = "⚠️ Compromised Password";
                document.getElementById('breachDetails').innerText = `This password was found in ${count.toLocaleString()} data breaches. Change it immediately.`;
            } else {
                statusBox.className = "breach-box breach-success";
                document.getElementById('breachTitle').innerText = "✅ Secure Password";
                document.getElementById('breachDetails').innerText = "No leaks detected in the global breach database.";
            }
        } catch (err) {
            alert("API Connection failed.");
        }
    }

    // 4. Generator Logic
    const slider = document.getElementById('lenSlider');
    const display = document.getElementById('lenDisplay');
    slider.oninput = () => display.innerText = slider.value;

    function generateNew() {
        const len = slider.value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let res = "";
        for (let i = 0; i < len; i++) {
            res += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById('passResult').innerText = res;
    }

    function copyPassword() {
        const text = document.getElementById('passResult').innerText;
        if(text === "Select Length...") return;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
