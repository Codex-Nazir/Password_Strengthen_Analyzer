<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultGuard | Password Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .tool-container { max-width: 800px; margin: 100px auto; padding: 20px; }
        .strength-meter { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.5s ease; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; background: rgba(255,255,255,0.05); }
        .breach-bad { border-left: 5px solid #ef4444; }
        .breach-good { border-left: 5px solid #22c55e; }
        .gen-display { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container tool-container">
    <h1 class="section-title"><i class="fas fa-key"></i> Vault<span class="gradient-text">Guard</span></h1>
    
    <!-- ANALYZER & BREACH CHECKER -->
    <div class="glass-card">
        <h3>Strength & Breach Intelligence</h3>
        <p style="color: var(--text-dim); margin-bottom: 20px;">Analyze password entropy and check against 10 billion+ leaked credentials.</p>
        
        <div style="position: relative;">
            <input type="password" id="passInput" placeholder="Enter password to test..." 
                style="width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 10px; font-size: 1.1rem;">
            <i class="fas fa-eye" id="togglePass" style="position: absolute; right: 15px; top: 18px; cursor: pointer; color: var(--text-dim);"></i>
        </div>

        <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="strengthText" style="font-weight: 600; font-size: 0.9rem;">Strength: 0%</span>
            <button onclick="checkBreach()" class="btn btn-primary" style="padding: 8px 15px; font-size: 0.8rem;">Check Breach <i class="fas fa-search-shield"></i></button>
        </div>

        <!-- Breach Report Area -->
        <div id="breachResult" class="result-box">
            <h4 id="breachTitle"></h4>
            <p id="breachDesc" style="font-size: 0.85rem; margin-top: 5px;"></p>
        </div>
    </div>

    <!-- PASSWORD GENERATOR -->
    <div class="glass-card" style="margin-top: 30px;">
        <h3>Secure Generator</h3>
        <p style="color: var(--text-dim); margin-bottom: 20px;">Generate cryptographically strong passwords.</p>
        
        <div class="gen-display">
            <span id="genOutput">••••••••••••</span>
            <i class="fas fa-copy" onclick="copyGen()" style="cursor: pointer; color: var(--accent);"></i>
        </div>

        <div style="margin-top: 20px;">
            <label style="font-size: 0.8rem;">Length: <span id="lenVal">16</span></label>
            <input type="range" id="genLength" min="8" max="32" value="16" style="width: 100%; margin: 10px 0;">
            <button onclick="generatePass()" class="btn btn-secondary" style="width: 100%;">Generate New Password</button>
        </div>
    </div>
</div>

<script>
    // 1. STRENGTH ANALYZER LOGIC
    const passInput = document.getElementById('passInput');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    passInput.addEventListener('input', () => {
        let val = passInput.value;
        let score = 0;
        if (!val) { score = 0; }
        else {
            if (val.length >= 8) score += 20;
            if (val.length >= 12) score += 20;
            if (/[A-Z]/.test(val)) score += 20;
            if (/[0-9]/.test(val)) score += 20;
            if (/[^A-Za-z0-9]/.test(val)) score += 20;
        }

        strengthBar.style.width = score + "%";
        strengthText.innerText = `Strength: ${score}%`;

        if (score <= 40) strengthBar.style.background = "#ef4444";
        else if (score <= 60) strengthBar.style.background = "#f59e0b";
        else if (score <= 80) strengthBar.style.background = "#3b82f6";
        else strengthBar.style.background = "#22c55e";
    });

    // 2. BREACH CHECKER (Have I Been Pwned API - Secure SHA-1)
    async function checkBreach() {
        const password = passInput.value;
        const resultBox = document.getElementById('breachResult');
        if (!password) return alert("Enter a password first!");

        // Hash password using SHA-1
        const msgUint8 = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-1', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();

        const prefix = hashHex.slice(0, 5);
        const suffix = hashHex.slice(5);

        try {
            const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`);
            const data = await response.text();
            const lines = data.split('\n');
            let count = 0;

            for (let line of lines) {
                const [hashSuffix, occurrence] = line.split(':');
                if (hashSuffix === suffix) {
                    count = parseInt(occurrence);
                    break;
                }
            }

            resultBox.style.display = "block";
            if (count > 0) {
                resultBox.className = "result-box breach-bad";
                document.getElementById('breachTitle').innerHTML = `⚠️ BREACH DETECTED!`;
                document.getElementById('breachDesc').innerText = `This password has appeared in ${count.toLocaleString()} known data breaches. It is NOT safe to use.`;
            } else {
                resultBox.className = "result-box breach-good";
                document.getElementById('breachTitle').innerHTML = `✅ SECURE`;
                document.getElementById('breachDesc').innerText = `No known breaches detected for this password.`;
            }
        } catch (e) {
            alert("Error connecting to breach database.");
        }
    }

    // 3. GENERATOR LOGIC
    function generatePass() {
        const len = document.getElementById('genLength').value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let retVal = "";
        for (let i = 0; i < len; ++i) {
            retVal += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById('genOutput').innerText = retVal;
    }

    document.getElementById('genLength').addEventListener('input', (e) => {
        document.getElementById('lenVal').innerText = e.target.value;
    });

    function copyGen() {
        const text = document.getElementById('genOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("Password copied!");
    }

    // Toggle Visibility
    document.getElementById('togglePass').addEventListener('click', function() {
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
